{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome — Attendance Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{% static 'attendance/css/style.css' %}?v=6" rel="stylesheet">
</head>
<body class="welcome-body">
    <div class="welcome-card">
        <div class="welcome-icon">
            <i class="bi bi-calendar2-check-fill"></i>
        </div>
        <h1 class="welcome-title">Track It..!</h1>

        {% if messages %}
            {% for message in messages %}
                <div class="welcome-msg">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post" class="welcome-form">
            {% csrf_token %}
            <div class="welcome-field">
                <i class="bi bi-person"></i>
                <input type="text" name="name" autofocus autocomplete="off"
                       placeholder="Your name" required>
            </div>
            <button type="submit" class="welcome-btn">
                Continue <i class="bi bi-arrow-right"></i>
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
