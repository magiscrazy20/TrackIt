databases:
  - name: trackit-db
    plan: free
    databaseName: trackit
    user: trackit

services:
  - type: web
    name: trackit
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn attendance_project.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: DATABASE_URL
        fromDatabase:
          name: trackit-db
          property: connectionString
